version: 1

project:
  title: FAIR and Open Science with Jupyter4NFDI
  authors:
    - name: Aleksandra Pawlik
      orcid: https://orcid.org/0000-0001-8418-6735

  toc:
    - file: notebooks/index.ipynb
    - file: notebooks/01_what_is_open_science.ipynb
    - file: notebooks/02_fair_principles.ipynb
