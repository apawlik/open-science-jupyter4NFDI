title: "Open Science tutorial for Jupyter4NFDI"
author: "Aleksandra Pawlik"
logo: ""
execute:
  execute_notebooks: "off"
repository:
  url: "https://github.com/apawlik/open-science-jupyter4NFDI"   
  path_to_book: ""
  branch: "main"
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  extra_footer: "This work is supported by Jupyter4NFDI as part of Base4NFDI (DFG project no.521453681)."
launch_buttons:
  binderhub_url: "https://mybinder.org"
  notebook_interface: "jupyterlab"
  thebe: true
thebe_config:
  repository_url: "https://github.com/apawlik/open-science-jupyter4NFDI"   
  repository_branch: "main"
  selector: ".thebe"
  codemirror-config:
    theme: "abcdef"
parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
sphinx:
  config:
    html_show_copyright: false
